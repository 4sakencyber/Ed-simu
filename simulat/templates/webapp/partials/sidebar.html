<aside id="sidebar" class="sidebar">
    <button id="sidebarToggle" class="side-toggle" type="button" aria-label="切换菜单">
        <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
            </svg>
        </span>
        <span class="side-text">菜单</span>
    </button>

    <div class="sidebar-section">
        <p class="sidebar-caption">Workspace</p>
        <nav>
            <button class="side-link active" data-page="simulation" type="button" title="仿真">
                <span class="side-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M6.5 7.5h11v9h-11z" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M3.5 10.5h2M18.5 10.5h2M3.5 13.5h2M18.5 13.5h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>

            </button>
            <button class="side-link" data-page="monitor" type="button" title="监控">
                <span class="side-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M4.5 17.5h15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>

                    </svg>
                </span>

            </button>
            <button class="side-link" data-page="logs" type="button" title="日志">
                <span class="side-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M6 6.5h12M6 11.5h12M6 16.5h8" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>

                    </svg>
                </span>
                <span class="side-text">日志</span>
            </button>
            <button class="side-link" data-page="settings" type="button" title="设置">
                <span class="side-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M12 8.7a3.3 3.3 0 1 1 0 6.6 3.3 3.3 0 0 1 0-6.6Z" stroke="currentColor" stroke-width="1.8"/>

                    </svg>
                </span>
                <span class="side-text">设置</span>
            </button>
        </nav>
    </div>

    <div class="sidebar-bottom">
        <p class="sidebar-caption">Info</p>
        <button class="side-link" data-page="about" type="button" title="项目说明">
            <span class="side-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 16.2V11.4M12 8.4h.01" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
                    <path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z" stroke="currentColor" stroke-width="1.6"/>
                </svg>
            </span>
            <span class="side-text">项目说明</span>
        </button>
